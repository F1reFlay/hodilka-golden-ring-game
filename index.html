<!-- ========================================== -->
<!-- ИНДЕКС ЧАСТЬ 1: СТИЛИ ПК И СВЕТЯЩИЙСЯ ТИТЛ -->
<!-- ========================================== -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игра-ходилка "Золотое кольцо России"</title>
<style>
body { font-family: sans-serif; background: #111213; color: #f1f2f3; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
.game-title { font-size: 36px; font-weight: bold; color: #a482ff; margin-top: 10px; margin-bottom: 20px; text-align: center; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(164, 130, 255, 0.6), 0 0 20px rgba(164, 130, 255, 0.3); background: #16181c; padding: 15px 40px; border-radius: 20px; border: 1px solid #2e3440; box-shadow: inset 0 0 15px rgba(164, 130, 255, 0.1), 0 4px 15px rgba(0,0,0,0.4); }
#start-screen { display: block; background: #16181c; padding: 40px; border-radius: 16px; border: 1px solid #2e3440; text-align: center; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; }
#start-screen h2 { margin-top: 0; color: #f1f2f3; font-size: 20px; }
.mode-section { margin-bottom: 20px; border-bottom: 1px solid #2e3440; padding-bottom: 15px; }
.mode-section:last-of-type { border-bottom: none; }
.btn-mode { padding: 12px 24px; font-size: 15px; margin: 6px; cursor: pointer; background: #232830; color: #fff; border: 2px solid #3b4252; border-radius: 20px; font-weight: bold; transition: all 0.2s ease; }
.btn-mode:hover { border-color: #a482ff; background: #1c1f26; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(164,130,255,0.2); }
.btn-mode:active { transform: translateY(-1px) scale(0.97); }
.btn-rules { background: #8be9fd; color: #111213; border: none; padding: 14px 30px; font-size: 16px; margin-top: 10px; }
.btn-rules:hover { background: #72cbdc; border-color: transparent; box-shadow: 0 6px 15px rgba(139,233,253,0.3); }
#game-interface { display: none; gap: 25px; margin-top: 20px; flex-direction: row; align-items: flex-start; }
canvas { border: 4px solid #2e3440; background: #16181c; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: block; }
#side-panel { width: 280px; background: #16181c; border: 1px solid #2e3440; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); box-sizing: border-box; }

<!-- ========================================== -->
<!-- ИНДЕКС ЧАСТЬ 2: ОКНА МОДАЛОК И АДАПТИВНОСТЬ -->
<!-- ========================================== -->
.btn-roll { padding: 18px; font-size: 18px; cursor: pointer; background: #50fa7b; color: #111213; border: none; border-radius: 20px !important; font-weight: bold; width: 100%; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
.btn-roll:hover:not(:disabled) { background: #40c762; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(80,250,123,0.4); }
.btn-roll:active:not(:disabled) { transform: translateY(-1px) scale(0.97); }
.btn-roll:disabled { color: #ffffff; cursor: not-allowed; box-shadow: none; transform: none; }
#turn-indicator { font-size: 18px; font-weight: bold; color: #8be9fd; text-align: center; padding: 12px; background: #232830; border-radius: 12px; border: 1px solid #3b4252; }
#dice-zone { font-size: 50px; text-align: center; margin: 5px 0; background: #232830; border-radius: 16px; padding: 15px; border: 1px solid #3b4252; }
.modal-layout { display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 1000; }
.modal-content-box { position: absolute; left: 0; top: 0; width: 380px; height: 100%; background: #1c1f26; border-right: 4px solid #f1c40f; box-shadow: 5px 0 30px rgba(0, 0, 0, 0.7); padding: 30px 20px; display: flex; flex-direction: column; animation: slideIn 0.3s ease; box-sizing: border-box; }
#rules-modal-content { border-right: 4px solid #8be9fd; }
@keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
.modal-header-text { font-size: 22px; color: #f1c40f; font-weight: bold; letter-spacing: 1.5px; margin-bottom: 25px; text-align: center; border-bottom: 2px solid #3b4252; padding-bottom: 12px; }
.rules-color-header { color: #8be9fd; }
.modal-scroll-text { font-size: 16px; line-height: 1.7; color: #e5e9f0; flex-grow: 1; overflow-y: auto; margin-bottom: 25px; padding-right: 10px; white-space: pre-line; }
.modal-scroll-text::-webkit-scrollbar { width: 6px; }
.modal-scroll-text::-webkit-scrollbar-thumb { background: #3b4252; border-radius: 4px; }
.modal-scroll-text::-webkit-scrollbar-thumb:hover { background: #f1c40f; }
.btn-close-modal { display: block; padding: 16px 20px; font-size: 16px; background: #f1c40f; color: #111213; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; width: 100%; box-shadow: 0 4px 12px rgba(241,196,15,0.3); }
.btn-close-modal:hover { background: #d4ac0d; transform: translateY(-3px); box-shadow: 0 6px 20px rgba(241,196,15,0.4); }
.btn-close-modal:active { transform: translateY(-1px) scale(0.97); }
.btn-close-rules { background: #8be9fd; box-shadow: 0 4px 12px rgba(139,233,253,0.3); }
.btn-close-rules:hover { background: #72cbdc; box-shadow: 0 6px 20px rgba(139,233,253,0.4); }
#win-modal { display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.75); z-index: 2000; }
#win-modal-content { position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 450px; background: #16181c; border-bottom: 4px solid #a482ff; border-left: 1px solid #2e3440; border-right: 1px solid #2e3440; border-radius: 0 0 24px 24px; padding: 40px 30px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8); animation: slideDown 0.4s ease; box-sizing: border-box; }
@keyframes slideDown { from { top: -100%; } to { top: 0; } }
.winner-badge { display: inline-block; padding: 20px 45px; font-size: 24px; font-weight: bold; color: #ffffff; border-radius: 24px; margin: 25px 0; transform: translateY(-8px); box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 10px 20px rgba(164, 130, 255, 0.3), 0 20px 40px rgba(164, 130, 255, 0.15), 0 30px 60px rgba(164, 130, 255, 0.08); border: 2px solid rgba(255,255,255,0.1); }
.btn-restart { padding: 16px 32px; font-size: 16px; background: #a482ff; color: #111213; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s ease; width: 100%; box-shadow: 0 4px 12px rgba(164,130,255,0.3); margin-top: 15px; }
.btn-restart:hover { background: #8c66ff; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(164,130,255,0.4); }
.btn-restart:active { transform: translateY(0) scale(0.98); }
@media (max-width: 1024px) {
#game-interface { flex-direction: column; align-items: center; }
canvas { max-width: 100%; width: 100% !important; height: auto !important; }
#side-panel { width: 100%; max-width: 500px; }
.game-title { font-size: 24px; padding: 10px 20px; margin-bottom: 10px; width: 90%; box-sizing: border-box; }
.modal-content-box { width: 100%; max-width: 100%; border-right: none; border-bottom: 4px solid #f1c40f; height: 80%; border-left: none; box-sizing: border-box; }
#rules-modal-content { border-bottom: 4px solid #8be9fd; }
#win-modal-content { width: 95%; padding: 25px 20px; }
.winner-badge { padding: 15px 30px; font-size: 20px; }
}
@media (max-width: 768px) {
body { padding: 15px; }
.game-title { font-size: 20px; padding: 8px 15px; margin-bottom: 8px; }
#start-screen { padding: 25px 20px; margin-top: 15px; width: 100%; box-sizing: border-box; }
#start-screen h2 { font-size: 16px; margin-bottom: 10px; }
.btn-mode { padding: 12px 20px; font-size: 14px; margin: 5px; width: calc(100% - 10px); }
#side-panel { padding: 12px; gap: 12px; }
.btn-roll { padding: 14px; font-size: 16px; }
#turn-indicator { font-size: 14px; padding: 8px; }
#dice-zone { font-size: 36px; padding: 10px; }
#win-modal-content { width: 90%; }
}
</style>
</head>

<!-- ========================================== -->
<!-- ИНДЕКС ЧАСТЬ 3: HTML СТРУКТУРА ПРИЛОЖЕНИЯ  -->
<!-- ========================================== -->
<body>
<div class="game-title">Золотое кольцо России</div>
<div id="start-screen">
<div class="mode-section">
<h2>🤖 Одиночная игра (против ботов):</h2>
<button class="btn-mode" onclick="startGame(2, true)">Вы + 1 Бот</button>
<button class="btn-mode" onclick="startGame(3, true)">Вы + 2 Бота</button>
<button class="btn-mode" onclick="startGame(4, true)">Вы + 3 Бота</button>
</div>
<div class="mode-section">
<h2>👥 Мультиплеер (на одном экране):</h2>
<button class="btn-mode" onclick="startGame(2, false)">2 Игрока</button>
<button class="btn-mode" onclick="startGame(3, false)">3 Игрока</button>
<button class="btn-mode" onclick="startGame(4, false)">4 Игрока</button>
</div>
<div class="mode-section">
<button class="btn-mode btn-rules" onclick="openRulesModal()">📜 Правила игры</button>
</div>
</div>
<div id="game-interface">
<div>
<canvas id="gameCanvas" width="850" height="510"></canvas>
</div>
<div id="side-panel">
<div id="turn-indicator">Ожидание...</div>
<div id="dice-zone">🎲</div>
<button id="roll-button" class="btn-roll" onclick="playerTurn()">Бросить кубик</button>
</div>
</div>
<div id="gold-modal" class="modal-layout">
<div class="modal-content-box">
<div class="modal-header-text">✨ ИСТОРИЯ ГОРОДА ✨</div>
<div id="gold-modal-text" class="modal-scroll-text">Текст...</div>
<button class="btn-close-modal" onclick="closeGoldModal()">Вернуться в игру</button>
</div>
</div>
<div id="rules-modal" class="modal-layout">
<div id="rules-modal-content" class="modal-content-box">
<div class="modal-header-text rules-color-header">📜 ПРАВИЛА ИГРЫ</div>
<div id="rules-modal-text" class="modal-scroll-text">Текст правил...</div>
<button class="btn-close-modal btn-close-rules" onclick="closeRulesModal()">Понятно</button>
</div>
</div>
<div id="win-modal">
<div id="win-modal-content">
<h2 style="color: #a482ff; margin: 0; font-size: 24px; letter-spacing: 1px;">🎉 Путешествие завершено! 🎉</h2>
<p style="color: #cbd5e1; margin-top: 10px; font-size: 15px;">Определился лидер великого похода:</p>
<div id="winner-name" class="winner-badge">Победитель</div>
<button class="btn-restart" onclick="backToMenu()">Выбрать другой режим</button>
</div>
</div>
<script src="game.js"></script>
</body>
</html>
